# Railway Multi-Service Configuration
# Professional Clinical Grade Infrastructure

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# Service 1: API Gateway & Clinical Interface
[services.api]
name = "api"
healthcheckPath = "/health"
restartPolicy = "ON_FAILURE"
# Professional migration safety: Run BEFORE deployment
preDeployCommand = "alembic upgrade head"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

# Service 2: Background Task Processor (ARQ Realtime)
[services.worker]
name = "worker-realtime"
restartPolicy = "ALWAYS"
# No networking needed for worker
startCommand = "python -m arq app.worker.realtime_worker.WorkerSettings"

# Service 3: Appointment Notification Processor (WhatsApp)
[services.worker-appointments]
name = "worker-appointments"
restartPolicy = "ALWAYS"
# Dedicated loop for clinical appointment safety
startCommand = "python -m arq app.worker.appointments_worker.AppointmentWorkerSettings"
